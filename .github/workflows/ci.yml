name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  syntax-check:
    name: Syntax and catalog checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile app.py app_paths.py SaveManager.py update.py hexedit.py itemdata.py savefile_io.py os_layer.py logic\checksum.py logic\hex_editor.py logic\inventory_tools.py gui\main_window.py

      - name: Validate item catalogs
        run: |
          python -c "from itemdata import Items; items = Items(); print('Categories:', len(items.categories)); print('Entries:', sum(len(v) for v in items.db.values()))"
